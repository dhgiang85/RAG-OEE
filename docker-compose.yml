name: rag-prod

services:
  # ──────────────────────────── Cơ sở hạ tầng (Alway-on) ────────────────────────────
  postgres:
    image: paradedb/paradedb:latest
    container_name: prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-rag}
      PGDATA: /var/lib/postgresql/data/pgdata
    command: >
      postgres
      -c shared_buffers=1GB
      -c effective_cache_size=3GB
      -c maintenance_work_mem=256MB
      -c work_mem=32MB
      -c max_connections=200
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    mem_limit: 2g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-rag}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: prod-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: prod-minio-init
    depends_on:
      minio: { condition: service_healthy }
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-documents}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing local/$$MINIO_BUCKET;
      mc version enable local/$$MINIO_BUCKET;
      exit 0;
      "

  # Tự động khởi tạo thư mục Parser, Embedder & OEE Audit Logs trên máy chủ mới
  data-init:
    image: alpine:3.20
    container_name: prod-data-init
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mkdir -p /data/parsed/need-checked /data/parsed/accepted /data/parsed/re-embed /data/parsed/embedded /data/parsed/rejected /data/parsed/rejected/_schema-error /data/parsed/rejected/_schema-mismatch /data/parsed/rejected/_duplicate /data/parsed/rejected/_orphan /data/parsed/rejected/_dim-mismatch /data/parsed/embedded/.archive
        mkdir -p /data/oee/audit-logs/incoming /data/oee/audit-logs/processed /data/oee/audit-logs/failed
        chmod -R 777 /data/parsed /data/oee
    volumes:
      - rag_data:/data

  # Thực thi Migrations Database
  migrate:
    image: dhgiant/rag3-migrate:latest
    container_name: prod-migrate
    command: ["migrate", "up"]
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
    restart: "no"

  # ──────────────────────────── Profile: CHAT (Hỗ trợ truy vấn) ────────────────────────────
  gateway:
    profiles: ["chat"]
    image: dhgiant/rag3-gateway:latest
    container_name: prod-gateway
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: prod-gateway
      INGESTION_URL: http://ingestion:8001
      PARSER_URL: http://parser-catalog:8002
      EMBEDDER_URL: http://embedder:8005
      RETRIEVER_URL: http://retriever:8003
      CHAT_URL: http://chat:8004
    depends_on:
      postgres: { condition: service_healthy }
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 128m

  retriever:
    profiles: ["chat"]
    image: dhgiant/rag3-retriever:latest
    container_name: prod-retriever
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: prod-retriever
      RETRIEVER_PORT: "8003"
    depends_on:
      postgres: { condition: service_healthy }
    ports:
      - "${RETRIEVER_PORT:-8003}:8003"
    mem_limit: 256m

  chat:
    profiles: ["chat"]
    image: dhgiant/rag3-chat:latest
    container_name: prod-chat
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: prod-chat
      CHAT_PORT: "8004"
      RETRIEVER_URL: http://retriever:8003
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      LLM_PRIMARY_PROVIDER: ${LLM_PRIMARY_PROVIDER}
      LLM_PRIMARY_MODEL: ${LLM_PRIMARY_MODEL}
    depends_on:
      postgres: { condition: service_healthy }
      retriever: { condition: service_started }
    ports:
      - "${CHAT_PORT:-8004}:8004"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 256m

  # ──────────────────────────── Profile: INGEST (Hỗ trợ nạp dữ liệu) ────────────────────────────
  ingestion:
    profiles: ["ingest"]
    image: dhgiant/rag3-ingestion:latest
    container_name: prod-ingestion
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: prod-ingestion
      INGEST_PORT: "8001"
    depends_on:
      postgres: { condition: service_healthy }
      minio: { condition: service_healthy }
    ports:
      - "${INGEST_PORT:-8001}:8001"
    mem_limit: 192m

  parser-catalog:
    profiles: ["ingest"]
    image: dhgiant/rag3-parser-catalog:latest
    container_name: prod-parser-catalog
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: prod-parser-catalog
      DATA_ROOT: /data
    depends_on:
      postgres: { condition: service_healthy }
      minio: { condition: service_healthy }
      data-init: { condition: service_completed_successfully }
    volumes:
      - rag_data:/data
      - parser_models:/root/.cache/rapidocr_onnxruntime
    mem_limit: 1500m

  embedder:
    profiles: ["ingest"]
    image: dhgiant/rag3-embedder:latest
    container_name: prod-embedder
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: prod-embedder
      DATA_ROOT: /data
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
    depends_on:
      postgres: { condition: service_healthy }
      data-init: { condition: service_completed_successfully }
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - rag_data:/data
    mem_limit: 512m

  # ──────────────────────────── Dịch vụ bổ sung CLI Ops ────────────────────────────
  ops:
    profiles: ["ops"]
    image: dhgiant/rag3-ops:latest
    container_name: prod-ops
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: ["/app/app"]
    restart: "no"

volumes:
  postgres_data:
  minio_data:
  # Mount dữ liệu thực tế tại thư mục `./data` trên máy chủ mới
  rag_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD:-.}/data
  parser_models:

networks:
  default:
    name: rag-network
    driver: bridge
